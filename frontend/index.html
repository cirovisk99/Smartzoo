<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SmartZoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --color-bg:         #3a4f1e;
        --color-surface:    #4a6228;
        --color-surface2:   #567030;
        --color-header:     #2d3f16;
        --color-orange:     #e8640e;
        --color-lime:       #5cb85c;
        --color-lime-dark:  #449d44;
        --color-active:     #5cb85c;
        --color-inactive:   #8a9e6a;
        --color-text:       #ffffff;
        --color-text-muted: rgba(255,255,255,0.65);
        --color-border:     rgba(255,255,255,0.12);
        --color-card-border:rgba(255,255,255,0.15);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: rgba(92, 184, 92, 0.2);
      }

      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Inter', sans-serif;
        font-size: 18px;
        background-color: var(--color-bg);
        color: var(--color-text);
        cursor: default;
        user-select: none;
        -webkit-user-select: none;
      }

      /* Scrollbar styling for touch displays */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

      /* Pulse animation for active markers */
      @keyframes pulse-ring {
        0% { transform: scale(1); opacity: 0.8; }
        70% { transform: scale(1.5); opacity: 0; }
        100% { transform: scale(1.5); opacity: 0; }
      }

      @keyframes pulse-dot {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }

      .pulse-active::before {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        background-color: var(--color-active);
        animation: pulse-ring 1.8s ease-out infinite;
        z-index: 0;
      }

      .pulse-active {
        animation: pulse-dot 1.8s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
