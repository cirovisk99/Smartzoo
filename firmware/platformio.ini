; SmartZoo — ESP32-S3 Sense Firmware
; Módulo 2: Detecção de Presença (TFLite)

[env:seeed_xiao_esp32s3]
platform  = espressif32
board     = seeed_xiao_esp32s3
framework = arduino

; Monitor serial
monitor_speed = 115200

; Bibliotecas
lib_deps =
    https://github.com/espressif/esp32-camera.git
    https://github.com/tensorflow/tflite-micro-arduino-examples.git

; Script roda antes da compilação:
;   1. Corrige compatibilidade da lib com ESP32 (remove código nRF52)
;   2. Copia person_detect_model_data.h/.cc para src/
extra_scripts = pre:scripts/setup_tflite.py

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -fpermissive          ; permite placement new com operator delete privado no GCC
